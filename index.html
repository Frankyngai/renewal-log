<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RENEWAL.LOG</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<style>
/* ── RESET & BASE ─────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Inter',system-ui,sans-serif;font-size:14px;background:#f0f5ff;color:#0b1c30}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:inherit}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}

/* ── MATERIAL ICONS ───────────────────────────────────────────────── */
.mi{font-family:'Material Symbols Outlined';font-style:normal;font-size:22px;line-height:1;
    font-variation-settings:'FILL' 0,'wght' 400;display:inline-block;vertical-align:middle}
.mi.fill{font-variation-settings:'FILL' 1,'wght' 400}

/* ── HEADER ───────────────────────────────────────────────────────── */
#app-header{
  position:sticky;top:0;z-index:100;
  background:rgba(240,245,255,0.92);backdrop-filter:blur(14px);
  border-bottom:1px solid rgba(0,0,0,0.06);
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
}
.logo{font-size:22px;font-weight:900;letter-spacing:-0.5px;color:#0b1c30}
.logo span{color:#00685f}
.logo-sub{font-size:9px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:#6d7a77;margin-top:1px}
.btn-add{
  background:#00685f;color:#fff;
  border-radius:100px;padding:9px 20px;
  font-size:13px;font-weight:700;
  box-shadow:0 4px 12px rgba(0,104,95,0.25);
  transition:opacity .15s,transform .1s;
}
.btn-add:active{opacity:.85;transform:scale(0.97)}

/* ── MAIN CONTENT ─────────────────────────────────────────────────── */
#main{max-width:680px;margin:0 auto;padding:20px 16px 120px}

/* ── STATS GRID ───────────────────────────────────────────────────── */
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px}
@media(min-width:480px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
.stat-card{border-radius:20px;padding:18px 16px}
.stat-card .label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.14em;margin-bottom:4px}
.stat-card .value{font-size:32px;font-weight:900;line-height:1;letter-spacing:-1px}
.stat-card .badge{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;margin-left:6px}
.s-total{background:#fff;border:1px solid rgba(0,0,0,0.06)}
.s-total .label{color:#6d7a77}.s-total .value{color:#0b1c30}
.s-due{background:#ffdad6;border:1px solid rgba(186,26,26,0.08)}
.s-due .label{color:#93000a}.s-due .value{color:#93000a}.s-due .badge{color:#ba1a1a}
.s-low{background:#ffddb8;border:1px solid rgba(133,83,0,0.08)}
.s-low .label{color:#653e00}.s-low .value{color:#653e00}
.s-done{background:#89f5e7;border:1px solid rgba(0,104,95,0.08)}
.s-done .label{color:#005049}.s-done .value{color:#005049}

/* ── FILTER CHIPS ─────────────────────────────────────────────────── */
.filter-bar{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.filter-bar::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:8px 16px;border-radius:100px;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;
  background:#dce9ff;color:#3d4947;
  transition:background .15s,color .15s;
}
.chip.active{background:#00685f;color:#fff}

/* ── SEARCH + SORT ────────────────────────────────────────────────── */
.controls-row{display:flex;gap:8px;margin-bottom:20px;align-items:center}
.search-wrap{flex:1;position:relative}
.search-wrap .mi{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#6d7a77;font-size:18px}
.search-wrap input{
  width:100%;background:#fff;border:1.5px solid #dce9ff;
  border-radius:12px;padding:10px 12px 10px 38px;
  font-size:13px;color:#0b1c30;outline:none;
  transition:border-color .15s;
}
.search-wrap input:focus{border-color:#00685f}
.search-wrap input::placeholder{color:#b0bcba}
.sort-wrap select{
  background:#fff;border:1.5px solid #dce9ff;border-radius:12px;
  padding:10px 12px;font-size:12px;font-weight:700;color:#0b1c30;
  outline:none;cursor:pointer;
  transition:border-color .15s;
}
.sort-wrap select:focus{border-color:#00685f}

/* ── ITEM CARDS ───────────────────────────────────────────────────── */
#item-list{display:flex;flex-direction:column;gap:12px}
.card{
  background:#fff;border-radius:20px;
  border-left:4px solid #bcc9c6;
  box-shadow:0 2px 8px rgba(11,28,48,0.06);
  overflow:hidden;
  transition:box-shadow .15s;
}
.card:hover{box-shadow:0 4px 16px rgba(11,28,48,0.1)}
.card.overdue{border-left-color:#ba1a1a}
.card.upcoming{border-left-color:#00685f}
.card.done{border-left-color:#6bd8cb;opacity:0.8}
.card.lowstock{border-left-color:#855300}

.card-inner{padding:16px}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.card-icon-wrap{
  width:46px;height:46px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;background:#e5eeff;
}
.card-icon-wrap .mi{font-size:22px;color:#00685f}
.card.overdue .card-icon-wrap{background:#ffdad6}
.card.overdue .card-icon-wrap .mi{color:#ba1a1a}
.card.done .card-icon-wrap .mi{color:#005049;opacity:0.7}

.card-info{flex:1;min-width:0}
.card-name{font-size:15px;font-weight:700;color:#0b1c30;margin-bottom:4px}
.card.done .card-name{color:#6d7a77}
.badge-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.badge{
  display:inline-block;font-size:9px;font-weight:800;
  text-transform:uppercase;letter-spacing:0.07em;
  padding:2px 7px;border-radius:6px;
}
.badge-overdue{background:#ba1a1a;color:#fff}
.badge-done{background:#89f5e7;color:#005049}
.badge-upcoming{background:#e5eeff;color:#005049}
.badge-period{background:#f0f5ff;color:#6d7a77;border:1px solid #dce9ff}
.badge-oos{background:#ffdad6;color:#93000a}
.badge-low{background:#ffddb8;color:#653e00}

.card-meta{font-size:11px;color:#6d7a77;font-weight:500}
.card-next{font-size:11px;color:#00685f;font-weight:700;margin-top:2px}

.card-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0}
.icon-btn{
  width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  background:#f0f5ff;color:#6d7a77;
  transition:background .15s,color .15s;
}
.icon-btn:hover{background:#dce9ff;color:#00685f}
.icon-btn.danger:hover{background:#ffdad6;color:#ba1a1a}
.icon-btn .mi{font-size:17px}

/* ── STOCK SECTION ────────────────────────────────────────────────── */
.stock-section{
  background:#f0f5ff;border-radius:14px;
  padding:12px 14px;margin-top:12px;
}
.stock-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.stock-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:#6d7a77}
.stock-label.low{color:#855300}
.stock-label.oos{color:#ba1a1a}
.stock-controls{display:flex;align-items:center;gap:10px}
.stock-btn{
  width:28px;height:28px;border-radius:50%;
  background:#dce9ff;color:#0b1c30;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:700;line-height:1;
  transition:background .12s;flex-shrink:0;
}
.stock-btn:hover{background:#00685f;color:#fff}
.stock-btn:active{transform:scale(0.92)}
.stock-num{font-size:15px;font-weight:800;color:#0b1c30;min-width:22px;text-align:center}
.stock-num.low{color:#855300}
.stock-num.oos{color:#ba1a1a}
.progress-bar{height:6px;background:#dce9ff;border-radius:100px;overflow:hidden}
.progress-fill{height:100%;border-radius:100px;background:#00685f;transition:width .3s}
.progress-fill.low{background:#855300}
.progress-fill.oos{background:#ba1a1a;width:0%!important}

/* ── MARK DONE BUTTON ─────────────────────────────────────────────── */
.mark-done-wrap{padding:12px 16px 16px}
.btn-mark-done{
  width:100%;padding:13px;border-radius:14px;
  background:linear-gradient(135deg,#00685f,#008378);
  color:#fff;font-size:13px;font-weight:700;
  box-shadow:0 4px 12px rgba(0,104,95,0.25);
  transition:opacity .15s,transform .1s;
}
.btn-mark-done:active{opacity:.85;transform:scale(0.98)}

/* ── EMPTY STATE ──────────────────────────────────────────────────── */
.empty-state{
  text-align:center;padding:60px 20px;
}
.empty-icon{
  width:72px;height:72px;background:#dce9ff;border-radius:22px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;
}
.empty-icon .mi{font-size:34px;color:#6d7a77}
.empty-title{font-size:16px;font-weight:700;color:#0b1c30;margin-bottom:6px}
.empty-sub{font-size:13px;color:#6d7a77}

/* ── BOTTOM NAV ───────────────────────────────────────────────────── */
#bottom-nav{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(255,255,255,0.88);backdrop-filter:blur(18px);
  border-top:1px solid rgba(0,0,0,0.06);
  display:flex;justify-content:space-around;
  padding:10px 0 max(18px,env(safe-area-inset-bottom));
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:6px 18px;border-radius:14px;
  color:#6d7a77;transition:color .15s;
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;
}
.nav-item.active{color:#00685f;background:rgba(0,104,95,0.08)}
.nav-item .mi{font-size:22px}
.nav-item.active .mi{font-variation-settings:'FILL' 1,'wght' 400}

/* ── FAB ──────────────────────────────────────────────────────────── */
#fab{
  position:fixed;right:18px;bottom:90px;z-index:101;
  width:52px;height:52px;border-radius:16px;
  background:linear-gradient(135deg,#00685f,#008378);
  color:#fff;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(0,104,95,0.35);
  transition:transform .15s,box-shadow .15s;
}
#fab:hover{transform:scale(1.06)}
#fab:active{transform:scale(0.94)}
#fab .mi{font-size:24px}
@media(min-width:640px){#fab{display:none}}

/* ── OVERLAY / MODAL ─────────────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(11,28,48,0.5);backdrop-filter:blur(4px);
  display:flex;align-items:flex-end;justify-content:center;
}
@media(min-width:580px){.overlay{align-items:center}}
.modal{
  background:#fff;width:100%;max-width:540px;
  border-radius:28px 28px 0 0;
  max-height:92dvh;overflow-y:auto;
  padding:10px 0 0;
}
@media(min-width:580px){.modal{border-radius:28px;max-height:88dvh}}
.modal-drag{width:40px;height:4px;background:#dce9ff;border-radius:100px;margin:0 auto 18px}
@media(min-width:580px){.modal-drag{display:none}}
.modal-inner{padding:0 20px 32px}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.modal-title{font-size:19px;font-weight:800;color:#0b1c30;letter-spacing:-0.3px}
.btn-close{
  width:34px;height:34px;border-radius:10px;
  background:#f0f5ff;color:#6d7a77;
  display:flex;align-items:center;justify-content:center;
}
.btn-close:hover{background:#dce9ff}
.btn-close .mi{font-size:18px}

/* Form elements */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#6d7a77;margin-bottom:7px}
.form-input{
  width:100%;background:#f0f5ff;border:2px solid transparent;
  border-radius:13px;padding:11px 14px;
  font-size:13px;color:#0b1c30;outline:none;
  transition:border-color .15s,background .15s;
}
.form-input:focus{border-color:#00685f;background:#fff}
.form-input::placeholder{color:#b0bcba}
.form-input.error{border-color:#ba1a1a;background:#fff8f8}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Category grid */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cat-btn{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:10px 6px;border-radius:14px;
  background:#f0f5ff;border:2px solid transparent;
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:#6d7a77;
  transition:all .15s;
}
.cat-btn .mi{font-size:22px;color:#6d7a77}
.cat-btn:hover{background:#dce9ff;border-color:#bcc9c6}
.cat-btn.active{background:#e8f8f6;border-color:#00685f;color:#005049}
.cat-btn.active .mi{color:#00685f;font-variation-settings:'FILL' 1,'wght' 400}

/* Modal footer */
.modal-footer{display:flex;gap:10px;margin-top:20px}
.btn-cancel{
  flex:1;padding:13px;border-radius:14px;
  background:#f0f5ff;color:#6d7a77;
  font-size:13px;font-weight:700;
  transition:background .15s;
}
.btn-cancel:hover{background:#dce9ff}
.btn-save{
  flex:1;padding:13px;border-radius:14px;
  background:linear-gradient(135deg,#00685f,#008378);
  color:#fff;font-size:13px;font-weight:700;
  box-shadow:0 4px 12px rgba(0,104,95,0.25);
  transition:opacity .15s;
}
.btn-save:hover{opacity:.9}
.btn-save:active{opacity:.8;transform:scale(0.98)}

/* Delete confirm */
.del-modal{
  background:#fff;width:100%;max-width:340px;
  border-radius:24px;padding:28px 24px;text-align:center;
}
.del-icon{
  width:56px;height:56px;background:#ffdad6;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;
}
.del-icon .mi{font-size:26px;color:#ba1a1a;font-variation-settings:'FILL' 1,'wght' 400}
.del-title{font-size:17px;font-weight:800;color:#0b1c30;margin-bottom:6px}
.del-sub{font-size:13px;color:#6d7a77;margin-bottom:22px}
.del-btns{display:flex;gap:10px}
.btn-del-cancel{flex:1;padding:12px;border-radius:12px;background:#f0f5ff;color:#6d7a77;font-size:13px;font-weight:700}
.btn-del-confirm{flex:1;padding:12px;border-radius:12px;background:#ba1a1a;color:#fff;font-size:13px;font-weight:700}
.btn-del-confirm:active{opacity:.85}
</style>
</head>
<body>

<!-- HEADER -->
<header id="app-header">
  <div>
    <div class="logo">RENEWAL<span>.</span>LOG</div>
    <div class="logo-sub" id="date-label"></div>
  </div>
  <button class="btn-add" onclick="openAdd()">+ Add Item</button>
</header>

<!-- MAIN -->
<div id="main">

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card s-total">
      <div class="label">Total Items</div>
      <div class="value" id="s-total">0</div>
    </div>
    <div class="stat-card s-due">
      <div class="label">Due Now</div>
      <div style="display:flex;align-items:baseline;gap:6px">
        <div class="value" id="s-due">0</div>
        <span class="badge" id="s-due-badge" style="color:#ba1a1a"></span>
      </div>
    </div>
    <div class="stat-card s-low">
      <div class="label">Low Stock</div>
      <div class="value" id="s-low">0</div>
    </div>
    <div class="stat-card s-done">
      <div class="label">Done</div>
      <div class="value" id="s-done">0</div>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filter-bar" id="filter-bar">
    <button class="chip active" data-filter="All"       onclick="setFilter(this)">All</button>
    <button class="chip"        data-filter="Due"       onclick="setFilter(this)">Due</button>
    <button class="chip"        data-filter="Upcoming"  onclick="setFilter(this)">Upcoming</button>
    <button class="chip"        data-filter="Done"      onclick="setFilter(this)">Done</button>
    <button class="chip"        data-filter="Low Stock" onclick="setFilter(this)">Low Stock</button>
  </div>

  <!-- SEARCH + SORT -->
  <div class="controls-row">
    <div class="search-wrap">
      <span class="mi">search</span>
      <input id="search-input" type="text" placeholder="Search items or notes…" oninput="render()"/>
    </div>
    <div class="sort-wrap">
      <select id="sort-select" onchange="render()">
        <option value="due">Due Date</option>
        <option value="name">Name</option>
        <option value="stock">Stock</option>
        <option value="period">Period</option>
        <option value="status">Status</option>
      </select>
    </div>
  </div>

  <!-- ITEM LIST -->
  <div id="item-list"></div>

</div><!-- /main -->

<!-- BOTTOM NAV -->
<nav id="bottom-nav">
  <div class="nav-item active">
    <span class="mi fill">inventory_2</span>
    Inventory
  </div>
  <div class="nav-item">
    <span class="mi">insert_chart</span>
    Analytics
  </div>
  <div class="nav-item">
    <span class="mi">event_repeat</span>
    Schedule
  </div>
  <div class="nav-item">
    <span class="mi">settings</span>
    Settings
  </div>
</nav>

<!-- FAB (mobile) -->
<button id="fab" onclick="openAdd()">
  <span class="mi">add</span>
</button>

<!-- ADD / EDIT MODAL -->
<div id="form-overlay" class="overlay" style="display:none" onclick="overlayClick(event,'form-overlay')">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-drag"></div>
    <div class="modal-inner">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">New Item</div>
        <button class="btn-close" onclick="closeForm()"><span class="mi">close</span></button>
      </div>

      <div class="form-group">
        <label class="form-label">Item Name</label>
        <input id="f-name" class="form-input" type="text" placeholder="e.g. Toothbrush"/>
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <div class="cat-grid" id="cat-grid"></div>
      </div>

      <div class="form-row" style="margin-bottom:16px">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Period</label>
          <select id="f-period" class="form-input" onchange="onPeriodChange()">
            <option value="daily">Daily</option>
            <option value="weekly">Weekly</option>
            <option value="monthly" selected>Monthly</option>
            <option value="quarterly">Quarterly</option>
            <option value="yearly">Yearly</option>
            <option value="specific">Specific Date</option>
          </select>
        </div>
        <div id="timing-group" class="form-group" style="margin-bottom:0">
          <label class="form-label">Timing</label>
          <select id="f-timing" class="form-input">
            <option value="begin">Beginning</option>
            <option value="end">End</option>
          </select>
        </div>
        <div id="date-group" class="form-group" style="margin-bottom:0;display:none">
          <label class="form-label">Date</label>
          <input id="f-date" class="form-input" type="date"/>
        </div>
      </div>

      <div class="form-row" style="margin-bottom:16px">
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Stock Count</label>
          <input id="f-stock" class="form-input" type="number" min="0" placeholder="Leave blank if N/A"/>
        </div>
        <div class="form-group" style="margin-bottom:0">
          <label class="form-label">Alert when &le;</label>
          <input id="f-thresh" class="form-input" type="number" min="0" value="1"/>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea id="f-notes" class="form-input" rows="2" placeholder="Optional reminder notes…" style="resize:none"></textarea>
      </div>

      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeForm()">Cancel</button>
        <button class="btn-save" id="btn-save" onclick="saveForm()">Save Item</button>
      </div>
    </div>
  </div>
</div>

<!-- DELETE CONFIRM -->
<div id="del-overlay" class="overlay" style="display:none" onclick="overlayClick(event,'del-overlay')">
  <div class="del-modal" onclick="event.stopPropagation()">
    <div class="del-icon"><span class="mi">delete</span></div>
    <div class="del-title">Delete Item?</div>
    <div class="del-sub">This action cannot be undone.</div>
    <div class="del-btns">
      <button class="btn-del-cancel" onclick="closeDelete()">Cancel</button>
      <button class="btn-del-confirm" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────────────────────────────────────
const CAT = {
  health:   {icon:'health_and_safety', label:'Health'},
  hygiene:  {icon:'clean_hands',       label:'Hygiene'},
  finance:  {icon:'payments',          label:'Finance'},
  home:     {icon:'home',              label:'Home'},
  food:     {icon:'restaurant',        label:'Food'},
  vehicle:  {icon:'directions_car',    label:'Vehicle'},
  tech:     {icon:'devices',           label:'Tech'},
  clothing: {icon:'checkroom',         label:'Clothing'},
  other:    {icon:'inventory_2',       label:'Other'},
};
const PERIOD_ORDER = ['daily','weekly','monthly','quarterly','yearly','specific'];
const PERIOD_LABEL = {daily:'Daily',weekly:'Weekly',monthly:'Monthly',quarterly:'Quarterly',yearly:'Yearly',specific:'Specific'};

const TODAY = new Date().toISOString().slice(0,10);

let items = [];
let activeFilter = 'All';
let editId = null;
let deleteId = null;
let formCat = 'hygiene';

// Persist
function loadItems(){
  try { items = JSON.parse(localStorage.getItem('rl3') || 'null') || defaultItems(); }
  catch(e){ items = defaultItems(); }
}
function saveItems(){ localStorage.setItem('rl3', JSON.stringify(items)); }

function defaultItems(){
  return [
    {id:'1',name:'Toothbrush',category:'hygiene',period:'monthly',timing:'begin',specificDate:'',stock:0,lowStockThreshold:1,lastRenewed:'',notes:'Replace electric head'},
    {id:'2',name:'Credit Card Bill',category:'finance',period:'monthly',timing:'end',specificDate:'',stock:'',lowStockThreshold:0,lastRenewed:'',notes:'Check all statements'},
    {id:'3',name:'Multivitamins',category:'health',period:'monthly',timing:'begin',specificDate:'',stock:2,lowStockThreshold:5,lastRenewed:TODAY,notes:'Take with breakfast'},
  ];
}

// ─────────────────────────────────────────────────────────────────────────────
// DATE LOGIC
// ─────────────────────────────────────────────────────────────────────────────
function periodStart(item){
  const n=new Date(), y=n.getFullYear(), m=n.getMonth();
  if(item.period==='daily') return TODAY;
  if(item.period==='weekly'){ const d=new Date(n); d.setDate(d.getDate()-d.getDay()); return d.toISOString().slice(0,10); }
  if(item.period==='monthly') return new Date(y,m,1).toISOString().slice(0,10);
  if(item.period==='quarterly'){ const q=Math.floor(m/3); return new Date(y,q*3,1).toISOString().slice(0,10); }
  if(item.period==='yearly') return y+'-01-01';
  return item.specificDate || TODAY;
}

function currentDue(item){
  const n=new Date(), y=n.getFullYear(), m=n.getMonth();
  if(item.period==='daily') return TODAY;
  if(item.period==='weekly'){
    const d=new Date(n); d.setDate(d.getDate()-d.getDay()+(item.timing==='end'?6:0));
    return d.toISOString().slice(0,10);
  }
  if(item.period==='monthly') return item.timing==='end'
    ? new Date(y,m+1,0).toISOString().slice(0,10)
    : new Date(y,m,1).toISOString().slice(0,10);
  if(item.period==='quarterly'){
    const q=Math.floor(m/3);
    return item.timing==='end'
      ? new Date(y,(q+1)*3,0).toISOString().slice(0,10)
      : new Date(y,q*3,1).toISOString().slice(0,10);
  }
  if(item.period==='yearly') return item.timing==='end' ? y+'-12-31' : y+'-01-01';
  return item.specificDate || TODAY;
}

function nextDue(item){
  const n=new Date(), y=n.getFullYear(), m=n.getMonth();
  if(item.period==='daily'){ const d=new Date(n); d.setDate(d.getDate()+1); return d.toISOString().slice(0,10); }
  if(item.period==='weekly'){
    const d=new Date(n); d.setDate(d.getDate()-d.getDay()+7+(item.timing==='end'?6:0));
    return d.toISOString().slice(0,10);
  }
  if(item.period==='monthly') return item.timing==='end'
    ? new Date(y,m+2,0).toISOString().slice(0,10)
    : new Date(y,m+1,1).toISOString().slice(0,10);
  if(item.period==='quarterly'){
    const q=Math.floor(m/3);
    return item.timing==='end'
      ? new Date(y,(q+2)*3,0).toISOString().slice(0,10)
      : new Date(y,(q+1)*3,1).toISOString().slice(0,10);
  }
  if(item.period==='yearly') return item.timing==='end' ? (y+1)+'-12-31' : (y+1)+'-01-01';
  return item.specificDate || TODAY;
}

function isDone(item){ return !!item.lastRenewed && item.lastRenewed >= periodStart(item); }

function daysUntil(dateStr){
  return Math.ceil((new Date(dateStr+'T00:00:00') - new Date(TODAY+'T00:00:00')) / 86400000);
}

function isLow(item){
  return item.stock !== '' && item.stock !== null && item.stock !== undefined
    && Number(item.lowStockThreshold||0) > 0
    && Number(item.stock) <= Number(item.lowStockThreshold);
}
function isOOS(item){ return item.stock !== '' && item.stock !== null && Number(item.stock) === 0; }

function fmtDate(str){
  return new Date(str+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function daysLabel(n){
  if(n===0) return 'today'; if(n===1) return 'tomorrow'; return 'in '+n+' days';
}

// ─────────────────────────────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────────────────────────────
function render(){
  const q   = (document.getElementById('search-input').value||'').toLowerCase();
  const srt = document.getElementById('sort-select').value;

  // Filter
  let list = items.filter(item=>{
    if(q && !item.name.toLowerCase().includes(q) && !(item.notes||'').toLowerCase().includes(q)) return false;
    if(activeFilter==='Due')       return !isDone(item) && daysUntil(currentDue(item))<=0;
    if(activeFilter==='Done')      return isDone(item);
    if(activeFilter==='Low Stock') return isLow(item);
    if(activeFilter==='Upcoming')  return !isDone(item) && daysUntil(currentDue(item))>0 && daysUntil(currentDue(item))<=7;
    return true;
  });

  // Sort
  list.sort((a,b)=>{
    if(srt==='due'){
      const da = isDone(a)?nextDue(a):currentDue(a);
      const db = isDone(b)?nextDue(b):currentDue(b);
      return da.localeCompare(db);
    }
    if(srt==='name')   return a.name.localeCompare(b.name);
    if(srt==='stock')  return (a.stock===''?9999:Number(a.stock))-(b.stock===''?9999:Number(b.stock));
    if(srt==='period') return PERIOD_ORDER.indexOf(a.period)-PERIOD_ORDER.indexOf(b.period);
    if(srt==='status'){
      const sc=x=>isDone(x)?2:daysUntil(currentDue(x))<=0?0:1;
      return sc(a)-sc(b);
    }
    return 0;
  });

  // Stats
  const dueC  = items.filter(i=>!isDone(i)&&daysUntil(currentDue(i))<=0).length;
  const lowC  = items.filter(isLow).length;
  const doneC = items.filter(isDone).length;
  document.getElementById('s-total').textContent = items.length;
  document.getElementById('s-due').textContent   = dueC;
  document.getElementById('s-due-badge').textContent = dueC>0?'Urgent':'';
  document.getElementById('s-low').textContent   = lowC;
  document.getElementById('s-done').textContent  = doneC;

  // Build cards
  const container = document.getElementById('item-list');
  if(list.length===0){
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon"><span class="mi">inventory_2</span></div>
        <div class="empty-title">No items found</div>
        <div class="empty-sub">Add your first renewal item to get started</div>
      </div>`;
    return;
  }

  container.innerHTML = list.map(item=>{
    const done    = isDone(item);
    const due     = currentDue(item);
    const days    = daysUntil(due);
    const overdue = !done && days<=0;
    const upcoming= !done && days>0 && days<=7;
    const low     = isLow(item);
    const oos     = isOOS(item);
    const cat     = CAT[item.category]||CAT.other;
    const stockNum= (item.stock!==''&&item.stock!==null)?Number(item.stock):null;
    const thresh  = Number(item.lowStockThreshold||1);

    // Card class
    let cardClass='card';
    if(overdue) cardClass+=' overdue';
    else if(done) cardClass+=' done';
    else if(upcoming) cardClass+=' upcoming';
    if(low) cardClass+=' lowstock';

    // Badges
    let badges='';
    if(overdue)   badges+=`<span class="badge badge-overdue">Overdue</span>`;
    if(done)      badges+=`<span class="badge badge-done">✓ Done</span>`;
    if(upcoming)  badges+=`<span class="badge badge-upcoming">Due in ${days}d</span>`;
    if(oos)       badges+=`<span class="badge badge-oos">Out of Stock</span>`;
    if(low&&!oos) badges+=`<span class="badge badge-low">Low Stock</span>`;
    badges+=`<span class="badge badge-period">${PERIOD_LABEL[item.period]||item.period}${item.timing&&item.period!=='specific'&&item.period!=='daily'?' · '+item.timing:''}</span>`;

    // Meta
    let metaHtml='';
    if(done){
      metaHtml=`<div class="card-meta">Renewed ${item.lastRenewed}</div>`;
      if(item.period!=='specific'){
        const nd=nextDue(item);
        const dl=daysLabel(daysUntil(nd));
        metaHtml+=`<div class="card-next">⟳ Next: ${fmtDate(nd)} (${dl})</div>`;
      }
    } else {
      metaHtml=`<div class="card-meta ${overdue?'':''}">Due: ${due}${overdue?' — Overdue!':''}</div>`;
    }
    if(item.notes) metaHtml+=`<div class="card-meta" style="margin-top:2px;font-style:italic;font-size:11px">${item.notes}</div>`;

    // Stock section
    let stockHtml='';
    if(stockNum!==null){
      const pct=Math.min(100,Math.round(stockNum/Math.max(stockNum,thresh,1)*100));
      const labelClass=oos?'oos':low?'low':'';
      const numClass=oos?'oos':low?'low':'';
      const fillClass=oos?'oos':low?'low':'';
      const stockText=oos?`Out of Stock (0 / ${thresh} threshold)`:low?`Low: ${stockNum} left (threshold ${thresh})`:`In Stock: ${stockNum}`;
      stockHtml=`
        <div class="stock-section">
          <div class="stock-top">
            <span class="stock-label ${labelClass}">${stockText}</span>
            <div class="stock-controls">
              <button class="stock-btn" onclick="adjStock('${item.id}',-1)">−</button>
              <span class="stock-num ${numClass}">${stockNum}</span>
              <button class="stock-btn" onclick="adjStock('${item.id}',+1)">+</button>
            </div>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${fillClass}" style="width:${oos?0:pct}%"></div>
          </div>
        </div>`;
    }

    // Mark done button
    const markDoneHtml = done ? '' : `
      <div class="mark-done-wrap">
        <button class="btn-mark-done" onclick="markDone('${item.id}')">Mark Done</button>
      </div>`;

    return `
      <div class="${cardClass}">
        <div class="card-inner">
          <div class="card-top">
            <div class="card-icon-wrap">
              <span class="mi fill">${cat.icon}</span>
            </div>
            <div class="card-info">
              <div class="card-name">${item.name}</div>
              <div class="badge-row">${badges}</div>
              ${metaHtml}
            </div>
            <div class="card-actions">
              <button class="icon-btn" onclick="openEdit('${item.id}')" title="Edit">
                <span class="mi">edit</span>
              </button>
              <button class="icon-btn danger" onclick="askDelete('${item.id}')" title="Delete">
                <span class="mi">delete</span>
              </button>
            </div>
          </div>
          ${stockHtml}
        </div>
        ${markDoneHtml}
      </div>`;
  }).join('');
}

// ─────────────────────────────────────────────────────────────────────────────
// FILTER
// ─────────────────────────────────────────────────────────────────────────────
function setFilter(btn){
  activeFilter = btn.dataset.filter;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
// CATEGORY GRID
// ─────────────────────────────────────────────────────────────────────────────
function buildCatGrid(){
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = Object.entries(CAT).map(([key,val])=>`
    <button type="button" class="cat-btn${formCat===key?' active':''}" onclick="selectCat('${key}')">
      <span class="mi">${val.icon}</span>
      ${val.label}
    </button>`).join('');
}

function selectCat(key){
  formCat=key;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.onclick.toString().includes("'"+key+"'")));
  buildCatGrid();
}

// ─────────────────────────────────────────────────────────────────────────────
// FORM
// ─────────────────────────────────────────────────────────────────────────────
function onPeriodChange(){
  const p = document.getElementById('f-period').value;
  document.getElementById('timing-group').style.display = (p==='daily'||p==='specific') ? 'none' : '';
  document.getElementById('date-group').style.display   = p==='specific' ? '' : 'none';
}

function openAdd(){
  editId=null; formCat='hygiene';
  document.getElementById('modal-title').textContent='New Item';
  document.getElementById('btn-save').textContent='Save Item';
  document.getElementById('f-name').value='';
  document.getElementById('f-period').value='monthly';
  document.getElementById('f-timing').value='begin';
  document.getElementById('f-date').value='';
  document.getElementById('f-stock').value='';
  document.getElementById('f-thresh').value='1';
  document.getElementById('f-notes').value='';
  document.getElementById('f-name').classList.remove('error');
  onPeriodChange();
  buildCatGrid();
  document.getElementById('form-overlay').style.display='flex';
}

function openEdit(id){
  const item = items.find(i=>i.id===id);
  if(!item) return;
  editId=id; formCat=item.category;
  document.getElementById('modal-title').textContent='Edit Item';
  document.getElementById('btn-save').textContent='Save Changes';
  document.getElementById('f-name').value=item.name;
  document.getElementById('f-period').value=item.period;
  document.getElementById('f-timing').value=item.timing||'begin';
  document.getElementById('f-date').value=item.specificDate||'';
  document.getElementById('f-stock').value=item.stock===''?'':item.stock;
  document.getElementById('f-thresh').value=item.lowStockThreshold||0;
  document.getElementById('f-notes').value=item.notes||'';
  document.getElementById('f-name').classList.remove('error');
  onPeriodChange();
  buildCatGrid();
  document.getElementById('form-overlay').style.display='flex';
}

function closeForm(){
  document.getElementById('form-overlay').style.display='none';
  editId=null;
}

function saveForm(){
  const name = document.getElementById('f-name').value.trim();
  if(!name){
    document.getElementById('f-name').classList.add('error');
    document.getElementById('f-name').focus();
    return;
  }
  document.getElementById('f-name').classList.remove('error');

  const stockVal = document.getElementById('f-stock').value;
  const obj = {
    name,
    category:         formCat,
    period:           document.getElementById('f-period').value,
    timing:           document.getElementById('f-timing').value,
    specificDate:     document.getElementById('f-date').value,
    stock:            stockVal==='' ? '' : Number(stockVal),
    lowStockThreshold:Number(document.getElementById('f-thresh').value)||0,
    notes:            document.getElementById('f-notes').value.trim(),
  };

  if(editId){
    items = items.map(i=>i.id===editId ? {...i,...obj} : i);
  } else {
    items.push({...obj, id: Date.now().toString(), lastRenewed:''});
  }

  saveItems();
  closeForm();
  render();
}

// ─────────────────────────────────────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────────────────────────────────────
function markDone(id){
  items = items.map(i=>{
    if(i.id!==id) return i;
    const newStock = i.stock!=='' ? Math.max(0,Number(i.stock)-1) : '';
    return {...i, lastRenewed:TODAY, stock:newStock};
  });
  saveItems(); render();
}

function adjStock(id, delta){
  items = items.map(i=>{
    if(i.id!==id) return i;
    return {...i, stock:Math.max(0,Number(i.stock||0)+delta)};
  });
  saveItems(); render();
}

function askDelete(id){
  deleteId=id;
  document.getElementById('del-overlay').style.display='flex';
}

function closeDelete(){
  document.getElementById('del-overlay').style.display='none';
  deleteId=null;
}

function confirmDelete(){
  if(deleteId){
    items = items.filter(i=>i.id!==deleteId);
    saveItems(); render();
  }
  closeDelete();
}

function overlayClick(e, overlayId){
  if(e.target.id===overlayId){
    if(overlayId==='form-overlay') closeForm();
    if(overlayId==='del-overlay')  closeDelete();
  }
}

// ─────────────────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────────────────
document.getElementById('date-label').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'}).toUpperCase();

loadItems();
render();
</script>
</body>
</html>
