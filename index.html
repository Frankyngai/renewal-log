<style>

<body class="min-h-screen pb-32 text-on-background">

<!-- ── HEADER ── -->
<header class="bg-[#f8f9ff]/90 backdrop-blur-xl sticky top-0 z-50 border-b border-outline-variant/20">

<div id="formModal" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeForm()">

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────
const CAT_ICONS = {
  health:"health_and_safety", hygiene:"clean_hands", finance:"payments",
  home:"home", food:"restaurant", vehicle:"directions_car",
  tech:"devices", clothing:"checkroom", other:"inventory_2"
};
const CAT_LABELS = {
  health:"Health", hygiene:"Hygiene", finance:"Finance",
  home:"Home", food:"Food", vehicle:"Vehicle",
  tech:"Tech", clothing:"Clothing", other:"Other"
};
const PERIODS = ["daily","weekly","monthly","quarterly","yearly","specific"];
const PLABELS = {daily:"Daily",weekly:"Weekly",monthly:"Monthly",quarterly:"Quarterly",yearly:"Yearly",specific:"Specific"};

let items = JSON.parse(localStorage.getItem("rl_items2") || "null") || [
  {id:"1",name:"Toothbrush",category:"hygiene",period:"monthly",timing:"begin",specificDate:"",stock:0,lowStockThreshold:1,lastRenewed:"",notes:"Replace electric head"},
  {id:"2",name:"Credit Card Bill",category:"finance",period:"monthly",timing:"end",specificDate:"",stock:"",lowStockThreshold:0,lastRenewed:"",notes:"Check all statements"},
  {id:"3",name:"Multivitamins",category:"health",period:"monthly",timing:"begin",specificDate:"",stock:2,lowStockThreshold:5,lastRenewed:new Date().toISOString().split("T")[0],notes:"Take with breakfast"},
];

let activeFilter = "All";
let editId = null;
let deleteId = null;
let formCat = "hygiene";

const todayStr = new Date().toISOString().split("T")[0];

function save(){ localStorage.setItem("rl_items2", JSON.stringify(items)); }

// ── DATE LOGIC ────────────────────────────────────────────────────────────────
function getDue(item){
  const n=new Date(), y=n.getFullYear(), m=n.getMonth();
  if(item.period==="daily") return todayStr;
  if(item.period==="weekly"){const d=new Date(n);d.setDate(d.getDate()-d.getDay()+(item.timing==="end"?6:0));return d.toISOString().split("T")[0];}
  if(item.period==="monthly") return item.timing==="end"?new Date(y,m+1,0).toISOString().split("T")[0]:new Date(y,m,1).toISOString().split("T")[0];
  if(item.period==="quarterly"){const q=Math.floor(m/3);return item.timing==="end"?new Date(y,(q+1)*3,0).toISOString().split("T")[0]:new Date(y,q*3,1).toISOString().split("T")[0];}
  if(item.period==="yearly") return item.timing==="end"?`${y}-12-31`:`${y}-01-01`;
  if(item.period==="specific") return item.specificDate||todayStr;
  return todayStr;
}
function getNextDue(item){
  const n=new Date(), y=n.getFullYear(), m=n.getMonth();
  if(item.period==="daily"){const d=new Date(n);d.setDate(d.getDate()+1);return d.toISOString().split("T")[0];}
  if(item.period==="weekly"){const d=new Date(n);d.setDate(d.getDate()-d.getDay()+7+(item.timing==="end"?6:0));return d.toISOString().split("T")[0];}
  if(item.period==="monthly") return item.timing==="end"?new Date(y,m+2,0).toISOString().split("T")[0]:new Date(y,m+1,1).toISOString().split("T")[0];
  if(item.period==="quarterly"){const q=Math.floor(m/3);return item.timing==="end"?new Date(y,(q+2)*3,0).toISOString().split("T")[0]:new Date(y,(q+1)*3,1).toISOString().split("T")[0];}
  if(item.period==="yearly") return item.timing==="end"?`${y+1}-12-31`:`${y+1}-01-01`;
  return item.specificDate||todayStr;
}
function getPeriodStart(item){
  const n=new Date(), y=n.getFullYear(), m=n.getMonth();
  if(item.period==="daily") return todayStr;
  if(item.period==="weekly"){const d=new Date(n);d.setDate(d.getDate()-d.getDay());return d.toISOString().split("T")[0];}
  if(item.period==="monthly") return new Date(y,m,1).toISOString().split("T")[0];
  if(item.period==="quarterly"){const q=Math.floor(m/3);return new Date(y,q*3,1).toISOString().split("T")[0];}
  if(item.period==="yearly") return `${y}-01-01`;
  return item.specificDate||todayStr;
}
const isDone = i => !!i.lastRenewed && i.lastRenewed >= getPeriodStart(i);
const daysUntil = i => Math.ceil((new Date(getDue(i))-new Date(todayStr))/86400000);
const daysUntilNext = i => Math.ceil((new Date(getNextDue(i))-new Date(todayStr))/86400000);
const isLow = i => i.stock!==""&&i.stock!==null&&i.stock!==undefined&&Number(i.lowStockThreshold||0)>0&&Number(i.stock)<=Number(i.lowStockThreshold);
const isOOS = i => i.stock!==""&&i.stock!==null&&Number(i.stock)===0;

function fmtDate(str){
  return new Date(str+"T00:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function daysLabel(d){
  if(d===0) return "today";
  if(d===1) return "tomorrow";
  return `${d} days`;
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const search = document.getElementById("searchInput").value.toLowerCase();
  const sortBy = document.getElementById("sortSelect").value;
  let list = [...items];

  if(search) list = list.filter(i=>i.name.toLowerCase().includes(search)||(i.notes||"").toLowerCase().includes(search));
  if(activeFilter==="Due")       list = list.filter(i=>!isDone(i)&&daysUntil(i)<=0);
  if(activeFilter==="Done")      list = list.filter(i=>isDone(i));
  if(activeFilter==="Low Stock") list = list.filter(i=>isLow(i));
  if(activeFilter==="Upcoming")  list = list.filter(i=>!isDone(i)&&daysUntil(i)>0&&daysUntil(i)<=7);

  list.sort((a,b)=>{
    if(sortBy==="Due Date"){const da=isDone(a)?getNextDue(a):getDue(a),db=isDone(b)?getNextDue(b):getDue(b);return da.localeCompare(db);}
    if(sortBy==="Name") return a.name.localeCompare(b.name);
    if(sortBy==="Stock Level") return (a.stock===""?999:Number(a.stock))-(b.stock===""?999:Number(b.stock));
    if(sortBy==="Period") return PERIODS.indexOf(a.period)-PERIODS.indexOf(b.period);
    if(sortBy==="Status"){const sc=x=>isDone(x)?2:daysUntil(x)<=0?0:1;return sc(a)-sc(b);}
    return 0;
  });

  // Stats
  const dueC  = items.filter(i=>!isDone(i)&&daysUntil(i)<=0).length;
  const lowC  = items.filter(isLow).length;
  const doneC = items.filter(isDone).length;
  document.getElementById("s-total").textContent = items.length;
  document.getElementById("s-due").textContent   = dueC;
  document.getElementById("s-due-label").textContent = dueC>0 ? "Urgent" : "";
  document.getElementById("s-low").textContent   = lowC;
  document.getElementById("s-done").textContent  = doneC;

  const container = document.getElementById("items");

  if(list.length===0){
    container.innerHTML = `
      <div class="text-center py-20">
        <div class="w-20 h-20 bg-surface-container rounded-3xl flex items-center justify-center mx-auto mb-4">
          <span class="material-symbols-outlined text-on-surface-variant/40" style="font-size:40px">inventory_2</span>
        </div>
        <p class="font-bold text-on-surface-variant">No items found</p>
        <p class="text-sm text-on-surface-variant/60 mt-1">Add your first renewal item above</p>
      </div>`;
    return;
  }

  container.innerHTML = list.map(item => {
    const done    = isDone(item);
    const days    = daysUntil(item);
    const overdue = !done && days<=0;
    const upcoming= !done && days>0 && days<=7;
    const low     = isLow(item);
    const oos     = isOOS(item);
    const stockNum= (item.stock!==""&&item.stock!==null) ? Number(item.stock) : null;
    const thresh  = Number(item.lowStockThreshold||1);
    const pct     = stockNum!==null ? Math.min(100,Math.round((stockNum/Math.max(stockNum,thresh,1))*100)) : null;
    const icon    = CAT_ICONS[item.category]||"inventory_2";

    // Left border + card colours
    let borderColor, iconBg, iconColor, cardBg;
    if(overdue)       { borderColor="#ba1a1a"; iconBg="bg-error-container"; iconColor="text-error"; cardBg="bg-surface-container-low"; }
    else if(done&&low){ borderColor="#fea619"; iconBg="bg-surface-container-highest"; iconColor="text-primary opacity-70"; cardBg="bg-surface-container-low"; }
    else if(done)     { borderColor="#6bd8cb"; iconBg="bg-surface-container-highest"; iconColor="text-primary opacity-70"; cardBg="bg-surface-container-low"; }
    else if(upcoming) { borderColor="#00685f"; iconBg="bg-surface-container-highest"; iconColor="text-primary"; cardBg="bg-surface-container-low"; }
    else              { borderColor="#bcc9c6"; iconBg="bg-surface-container-highest"; iconColor="text-primary"; cardBg="bg-surface-container-low"; }

    // Badges
    let badges = "";
    if(overdue)  badges += `<span class="bg-error text-white text-[10px] font-black px-2 py-0.5 rounded tracking-tight">OVERDUE</span>`;
    if(done)     badges += `<span class="bg-primary-fixed text-on-primary-fixed-variant text-[10px] font-bold px-2 py-0.5 rounded tracking-tight">✓ Done</span>`;
    if(upcoming) badges += `<span class="bg-primary-fixed text-on-primary-fixed-variant text-[10px] font-bold px-2 py-0.5 rounded tracking-tight">Due in ${days}d</span>`;
    if(oos)      badges += `<span class="bg-error-container text-on-error-container text-[10px] font-bold px-2 py-0.5 rounded tracking-tight">Out of Stock</span>`;
    if(low&&!oos)badges += `<span class="bg-secondary-fixed text-on-secondary-fixed-variant text-[10px] font-bold px-2 py-0.5 rounded tracking-tight">Low Stock</span>`;
    badges += `<span class="bg-surface-container text-on-surface-variant text-[10px] font-bold px-2 py-0.5 rounded tracking-tight">${PLABELS[item.period]}${item.timing&&item.period!=="specific"&&item.period!=="daily"?" · "+item.timing:""}</span>`;

    // Meta line
    const metaLine = done
      ? `<p class="text-[11px] text-primary font-bold uppercase tracking-wider">⟳ Next: ${fmtDate(getNextDue(item))} (in ${daysLabel(daysUntilNext(item))})</p>`
      : `<p class="text-[11px] text-on-surface-variant font-bold uppercase tracking-wider ${overdue?'text-error':''}">${overdue?'Was due':'Due'}: ${getDue(item)}</p>`;

    // Notes
    const notesHtml = item.notes ? `<p class="text-[11px] text-on-surface-variant/60 mt-0.5 italic">${item.notes}</p>` : "";

    // Stock section
    let stockHtml = "";
    if(stockNum !== null){
      const barColor = low ? "bg-error" : "bg-secondary";
      const barW     = low ? "bg-error-container" : "bg-surface-container-high";
      const stockLabel= oos
        ? `<span class="text-[10px] font-bold uppercase tracking-widest text-error">Out of Stock (${stockNum}/${thresh})</span>`
        : low
        ? `<span class="text-[10px] font-bold uppercase tracking-widest text-secondary">Low Stock: ${stockNum} remaining</span>`
        : `<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Stock: ${stockNum} / ${thresh} threshold</span>`;
      stockHtml = `
        <div class="bg-surface-container-lowest rounded-2xl p-4 flex flex-col gap-2">
          <div class="flex justify-between items-center">
            ${stockLabel}
            <div class="flex items-center gap-2">
              <button onclick="adjStock('${item.id}',-1)" class="w-7 h-7 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant font-bold hover:bg-surface-container-high active:scale-90 transition-all">
                <span class="material-symbols-outlined" style="font-size:16px">remove</span>
              </button>
              <span class="text-sm font-black w-5 text-center ${low?'text-error':'text-on-surface'}">${stockNum}</span>
              <button onclick="adjStock('${item.id}',+1)" class="w-7 h-7 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant font-bold hover:bg-surface-container-high active:scale-90 transition-all">
                <span class="material-symbols-outlined" style="font-size:16px">add</span>
              </button>
            </div>
          </div>
          <div class="w-full h-2 ${barW} rounded-full overflow-hidden">
            <div class="h-full ${barColor} rounded-full transition-all" style="width:${pct}%"></div>
          </div>
        </div>`;
    }

    // Mark Done button
    const markDoneBtn = done ? "" : `
      <button onclick="markDone('${item.id}')" class="w-full mark-done-btn text-white py-3.5 rounded-xl font-bold text-sm shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">
        Mark Done
      </button>`;

    return `
    <div class="bg-surface-container-lowest rounded-3xl p-1 shadow-md shadow-on-surface/5 border-l-4 ${done?'opacity-75':''}" style="border-left-color:${borderColor}">
      <div class="${cardBg} rounded-[1.25rem] p-5 flex flex-col gap-4">
        <div class="flex items-start justify-between">
          <div class="flex items-center gap-4">
            <div class="w-12 h-12 ${iconBg} rounded-2xl flex items-center justify-center ${iconColor} flex-shrink-0">
              <span class="material-symbols-outlined fill-icon">${icon}</span>
            </div>
            <div class="min-w-0">
              <div class="flex items-center gap-2 flex-wrap mb-0.5">
                <h3 class="text-[17px] font-bold tracking-tight text-on-surface leading-tight">${item.name}</h3>
              </div>
              <div class="flex items-center gap-1.5 flex-wrap mb-1">${badges}</div>
              ${metaLine}
              ${notesHtml}
            </div>
          </div>
          <div class="flex gap-0.5 flex-shrink-0">
            <button onclick="openEdit('${item.id}')" class="p-2 hover:bg-surface-container-high rounded-full transition-colors text-on-surface-variant">
              <span class="material-symbols-outlined text-xl">edit</span>
            </button>
            <button onclick="askDelete('${item.id}')" class="p-2 hover:bg-error-container/60 rounded-full transition-colors text-error">
              <span class="material-symbols-outlined text-xl">delete</span>
            </button>
          </div>
        </div>
        ${stockHtml}
        ${markDoneBtn ? `<div class="bg-surface-container-lowest rounded-2xl p-3">${markDoneBtn}</div>` : ""}
      </div>
    </div>`;
  }).join("");
}

// ── FILTER BUTTONS ────────────────────────────────────────────────────────────
function setFilter(f){
  activeFilter = f;
  document.querySelectorAll(".filter-btn").forEach(b=>{
    b.classList.remove("bg-primary","text-white","active-filter");
    b.classList.add("bg-surface-container-high","text-on-surface-variant");
  });
  const active = document.getElementById("fb-"+f.replace(" ","-"));
  if(active){
    active.classList.remove("bg-surface-container-high","text-on-surface-variant");
    active.classList.add("bg-primary","text-white");
  }
  render();
}
// Init filter styles
document.querySelectorAll(".filter-btn").forEach(b=>{
  if(!b.classList.contains("active-filter")){
    b.classList.add("bg-surface-container-high","text-on-surface-variant");
  } else {
    b.classList.add("bg-primary","text-white");
    b.classList.remove("active-filter");
  }
});

// ── CATEGORY GRID ─────────────────────────────────────────────────────────────
function buildCatGrid(){
  const g = document.getElementById("catGrid"); g.innerHTML="";
  Object.entries(CAT_ICONS).forEach(([cat,icon])=>{
    const b = document.createElement("button");
    b.type = "button";
    b.className = "cat-btn" + (formCat===cat?" active":"");
    b.innerHTML = `<span class="material-symbols-outlined fill-icon" style="font-size:22px">${icon}</span><span>${CAT_LABELS[cat]}</span>`;
    b.onclick = ()=>{ formCat=cat; buildCatGrid(); };
    g.appendChild(b);
  });
}

function updateFormPeriod(){
  const p = document.getElementById("f-period").value;
  document.getElementById("timingGroup").style.display = (p==="daily"||p==="specific")?"none":"block";
  document.getElementById("dateGroup").style.display   = p==="specific"?"block":"none";
}

// ── CRUD ──────────────────────────────────────────────────────────────────────
function openAdd(){
  editId=null; formCat="hygiene";
  document.getElementById("formTitle").textContent="New Item";
  document.getElementById("saveBtn").textContent="Save Item";
  document.getElementById("f-name").value="";
  document.getElementById("f-period").value="monthly";
  document.getElementById("f-timing").value="begin";
  document.getElementById("f-date").value="";
  document.getElementById("f-stock").value="";
  document.getElementById("f-thresh").value="1";
  document.getElementById("f-notes").value="";
  updateFormPeriod(); buildCatGrid();
  document.getElementById("formModal").style.display="flex";
}

function openEdit(id){
  const item = items.find(i=>i.id===id); if(!item)return;
  editId=id; formCat=item.category;
  document.getElementById("formTitle").textContent="Edit Item";
  document.getElementById("saveBtn").textContent="Save Changes";
  document.getElementById("f-name").value=item.name;
  document.getElementById("f-period").value=item.period;
  document.getElementById("f-timing").value=item.timing||"begin";
  document.getElementById("f-date").value=item.specificDate||"";
  document.getElementById("f-stock").value=item.stock===""?"":item.stock;
  document.getElementById("f-thresh").value=item.lowStockThreshold||0;
  document.getElementById("f-notes").value=item.notes||"";
  updateFormPeriod(); buildCatGrid();
  document.getElementById("formModal").style.display="flex";
}

function closeForm(){ document.getElementById("formModal").style.display="none"; editId=null; }

function saveForm(){
  const name = document.getElementById("f-name").value.trim();
  if(!name){
    document.getElementById("f-name").classList.add("border-error");
    document.getElementById("f-name").focus();
    setTimeout(()=>document.getElementById("f-name").classList.remove("border-error"),1500);
    return;
  }
  const obj = {
    name, category:formCat,
    period:   document.getElementById("f-period").value,
    timing:   document.getElementById("f-timing").value,
    specificDate: document.getElementById("f-date").value,
    stock:    document.getElementById("f-stock").value===""?"":Number(document.getElementById("f-stock").value),
    lowStockThreshold: Number(document.getElementById("f-thresh").value)||0,
    notes:    document.getElementById("f-notes").value
  };
  if(editId){ items=items.map(i=>i.id===editId?{...i,...obj}:i); }
  else       { items.push({...obj, id:Date.now().toString(), lastRenewed:""}); }
  save(); closeForm(); render();
}

function markDone(id){
  items=items.map(i=>i.id===id?{...i,lastRenewed:todayStr,stock:i.stock!==""?Math.max(0,Number(i.stock)-1):""}:i);
  save(); render();
}

function adjStock(id,d){
  items=items.map(i=>i.id===id?{...i,stock:Math.max(0,Number(i.stock||0)+d)}:i);
  save(); render();
}

function askDelete(id){ deleteId=id; document.getElementById("delModal").style.display="flex"; }

function confirmDelete(){
  if(deleteId){ items=items.filter(i=>i.id!==deleteId); deleteId=null; save(); }
  document.getElementById("delModal").style.display="none";
  render();
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById("dateLabel").textContent =
  new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"}).toUpperCase();

render();
</script>
